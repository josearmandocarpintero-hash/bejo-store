<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeJo Admin</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#1c1c1c;
      padding:30px;
      border-radius:12px;
      width:300px;
      box-shadow:0 0 20px rgba(0,0,0,.5);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:none;
      border-radius:8px;
      background:#2a2a2a;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#ff9800;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }

    #panel{
      display:none;
      text-align:center;
    }

    a{
      color:#ff9800;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h1>Admin Login</h1>

  <input type="text" id="user" placeholder="Usuário">
  <input type="password" id="pass" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<div id="panel">
  <h1>Painel Admin</h1>
  <p>Login realizado com sucesso.</p>

  <a href="bejo-store.html" target="_blank">
    Abrir Loja
  </a>
</div>

<script>
  const usuario = 'admin';
  const senha = 'bejo2026';

  function login(){
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    if(u === usuario && p === senha){
      document.getElementById('loginBox').style.display='none';
      document.getElementById('panel').style.display='block';
    } else {
      alert('Usuário ou senha incorretos');
    }
  }
</script>

</body>
</html>
